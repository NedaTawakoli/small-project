<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: aliceblue;">
          <nav style="width: 70%; margin: 30px auto; background-color: cadetblue;color: aliceblue;border-radius: 4px 4px 0 0;  justify-content: space-between;display: flex;">
            <h1 id="text1" style="padding: 3px 25px;">About Me</h1>
            <h1 id="text2" style="padding: 3px 25px;">My Goals</h1>
        </nav>
    <div style="width: 70%; margin: 15px auto; display:flex; flex-wrap: wrap; justify-content: space-between;">
      
        <div id="box1" style="border: 1px solid cadetblue;border-radius: 0 0 10px 10px; box-shadow: 10px 10px 30px cadetblue; width: 35%; text-align: justify;display: none;">
           <h1 style="width: 100%; padding: 10px 0; text-align: center; color: aliceblue; background-color: cadetblue;margin-top: 0; padding-top: 0;">About Me</h1>
            <h3 style="padding: 6px 15px; color: cadetblue;  font-size:25px; text-align: center;">I am Neda Tavakoli. I am 18 years old. I am from Afghanistan</h3>
        </div>
         <div id="box2" style="border: 1px solid cadetblue;border-radius: 0 0 10px 10px; box-shadow: 10px 10px 30px cadetblue; width: 35%; text-align: justify; display: none;">
           <h1 style="width: 100%; padding: 10px 0; text-align: center; color: aliceblue; background-color: cadetblue;margin-top: 0; padding-top: 0;">My Goals</h1>
            <h3 style="padding: 0 15px; color: cadetblue; text-align: center;font-size: 25px;">I want to build amazing website and share my experiences</h3>
        </div>
    </div>
    <script>
   const box1 = document.getElementById('box1');
   const box2 = document.getElementById('box2');
   const text1 = document.getElementById('text1');
   const text2 = document.getElementById('text2');
   text1.addEventListener("click",()=>{
    box2.style.display="none"
    box1.style.display="flex";
    box1.style.flexDirection="column";
    box1.style.margin="10px auto"
   });
   text2.addEventListener("click",()=>{
    box1.style.display="none";
    box2.style.display="flex";
    box2.style.flexDirection="column";
      box2.style.margin="10px auto"
   })
</script>
</body>
</html>
